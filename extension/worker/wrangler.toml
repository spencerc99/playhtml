name = "playhtml-game-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Environment variables
# 
# For LOCAL DEVELOPMENT:
#   Create a .dev.vars file (see .dev.vars.example)
#   wrangler dev will automatically load variables from .dev.vars
#
# For PRODUCTION:
#   Set secrets via: wrangler secret put SUPABASE_URL
#   Set secrets via: wrangler secret put SUPABASE_SECRET_KEY
#   Set secrets via: wrangler secret put ADMIN_KEY
#   Set secrets via: wrangler secret put RESEND_API_KEY
#   Optional:        wrangler secret put RESEND_SEGMENT_ID
#
# Required variables:
# - SUPABASE_URL - Your Supabase project URL
# - SUPABASE_SECRET_KEY - Your Supabase "secret" API key (full database access)
# - ADMIN_KEY - Required for admin endpoints (stats, export) - protects user data
# - RESEND_API_KEY - Resend API key for sending welcome emails and adding contacts
#
# Optional variables:
# - RESEND_SEGMENT_ID - If set, new contacts are tagged with this Resend segment
#
# Security model:
# - POST /events: Public (validated + rate limited)
# - GET /events/recent: Public (for artwork rendering)
# - GET /events/stats: ADMIN_KEY required
# - POST /events/export: ADMIN_KEY required
#
# TODO: Consider adding CORS restrictions to admin endpoints

# Deploys to the workers.dev subdomain by default; no custom domain needed.
# Note: rate limiting in /subscribe is per-isolate (in-memory Map), so the
# effective limit is ~5/min × N active isolates. Acceptable at this scale.

# Durable Object: live cursor-event stream hub for the website portrait page.
[[durable_objects.bindings]]
name = "LIVE_EVENTS_HUB"
class_name = "LiveEventsHub"

[[migrations]]
tag = "v1"
new_classes = ["LiveEventsHub"]
