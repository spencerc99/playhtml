    <path d="M59 69 41 51" fill="none" stroke="#704b23" stroke-width="9" stroke-linecap="round"/>
    <circle cx="30" cy="105" r="17" fill="none" stroke="#bd5e50" stroke-width="10"/>
    <circle cx="29" cy="40" r="17" fill="none" stroke="#4d9688" stroke-width="10"/>
    <circle cx="61" cy="72" r="2.5" fill="#fff3c7"/>
  </g>
</svg>
