name: PR Validation

on:
  pull_request:
    branches: [ main ]

jobs:
  build-site:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        # Astro 6 (apps/docs) requires Node >= 22.12.
        node-version: '22'

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Build packages
      run: bun build-packages

    - name: Run core tests
      run: cd packages/playhtml && bun run test

    - name: Run docs tests
      run: cd apps/docs && bun run test

    - name: Run react tests
      run: cd packages/react && bun run test

    - name: Run extension tests
      # The extension's `test` script is bare `vitest` (watch mode), so invoke
      # `vitest run` explicitly here. Depends on the built @playhtml/common
      # dist from the Build packages step above.
      run: cd extension && bunx vitest run

    - name: Lint
      run: bun run lint
      continue-on-error: true  # Report lint results but do not block merge

    - name: Build site
      run: bun build-site

    - name: Install Playwright browsers
      run: bunx playwright install --with-deps chromium
      working-directory: smoke-tests

    - name: Run smoke tests
      run: bun smoke

    - name: Upload smoke test report
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: smoke-test-report
        path: |
          smoke-tests/playwright-report
          smoke-tests/test-results
        retention-days: 7
